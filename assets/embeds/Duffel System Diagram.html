  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en-GB\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>The system: two products, two workflows<\u002Ftitle>\n<script>\n  (function () {\n    try {\n      var k = \"diagram-theme\", s = localStorage.getItem(k);\n      var t = s || ((window.matchMedia && matchMedia(\"(prefers-color-scheme: dark)\").matches) ? \"dark\" : \"light\");\n      document.documentElement.setAttribute(\"data-theme\", t);\n    } catch (e) {\n      document.documentElement.setAttribute(\"data-theme\", \"light\");\n    }\n  })();\n<\u002Fscript>\n<style>/* Duffel webfonts — GT America (Standard + Mono), licensed from Grilli Type */\n\n@font-face {\n  font-family: \"GT America\";\n  src: url(\"6b8b0f57-5730-4ba8-9ab1-56b41fa50edf\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"GT America\";\n  src: url(\"2f8b76ab-d696-4221-81bc-ce0701083c3f\") format(\"opentype\");\n  font-weight: 400;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"GT America\";\n  src: url(\"ba936150-de67-4ea5-bf8a-b77449431f28\") format(\"opentype\");\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"GT America\";\n  src: url(\"876866c1-2046-441a-976f-0a2f1143e238\") format(\"opentype\");\n  font-weight: 500;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"GT America\";\n  src: url(\"851c33d6-58bf-4b69-bae4-5c3328a37097\") format(\"opentype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"GT America\";\n  src: url(\"707344c1-3668-4154-9812-eec757614609\") format(\"opentype\");\n  font-weight: 700;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"GT America Mono\";\n  src: url(\"0e385733-99c7-42c7-ad01-adc6644f235a\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"GT America Mono\";\n  src: url(\"33486e2d-1131-4de7-a9ec-2c92b21d3e91\") format(\"opentype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n<\u002Fstyle>\n<style>/* ──────────────────────────────────────────────────────────────────\n   Duffel color tokens\n   Two systems live here:\n   1. BRAND palette (--duffel-<hue>-<100..900>) — from the Brand\n      Guidelines cheatsheet (01.2026). Used for marketing, comms,\n      decks, \"expressive opportunities\". Core colors are backgrounds;\n      tints/shades create hierarchy.\n   2. PRODUCT scales (--gray-1..12, --purple-1..12, semantic) —\n      Radix-Themes-style 12-step scales used by the Dashboard UI.\n      1-2 backgrounds · 3-5 component fills · 6-8 borders ·\n      9-10 solid fills · 11-12 text.\n   ────────────────────────────────────────────────────────────────── */\n\n:root {\n  /* ── 1. Brand palette ─────────────────────────────────────────── */\n  --duffel-black: #000000;\n  --duffel-white: #FFFFFF;\n\n  --duffel-grey-100: #E2E2E8;\n  --duffel-grey-200: #E2E2E8;\n  --duffel-grey-300: #CCCCD4;\n  --duffel-grey-400: #ABABB4;\n  --duffel-grey-500: #86868E;\n  --duffel-grey-600: #696972;\n  --duffel-grey-700: #4B4B55;\n  --duffel-grey-800: #34343D;\n  --duffel-grey-900: #161616;\n\n  --duffel-purple-100: #F2EBFF;\n  --duffel-purple-200: #E8DCFF;\n  --duffel-purple-300: #DBC8FF;\n  --duffel-purple-400: #C7ADFF;\n  --duffel-purple-500: #B696F9;\n  --duffel-purple-600: #9E7CE8;\n  --duffel-purple-700: #7459AC;\n  --duffel-purple-800: #413463;\n  --duffel-purple-900: #100024;\n\n  --duffel-green-100: #E5F8F4;\n  --duffel-green-200: #CCEFE9;\n  --duffel-green-300: #AFE7DC;\n  --duffel-green-400: #89CFC2;\n  --duffel-green-500: #6CBFB0;\n  --duffel-green-600: #5AAA9C;\n  --duffel-green-700: #388275;\n  --duffel-green-800: #206C5E;\n  --duffel-green-900: #00231D;\n\n  --duffel-pink-100: #FFE9E9;\n  --duffel-pink-200: #FFD4D4;\n  --duffel-pink-300: #FFB5B5;\n  --duffel-pink-400: #F88989;\n  --duffel-pink-500: #FD6F77;\n  --duffel-pink-600: #F6515B;\n  --duffel-pink-700: #DB2F46;\n  --duffel-pink-800: #9E1A2B;\n  --duffel-pink-900: #600E19;\n\n  --duffel-blue-100: #E5EEFB;\n  --duffel-blue-200: #D4E7FF;\n  --duffel-blue-300: #BBD9FF;\n  --duffel-blue-400: #92BFF8;\n  --duffel-blue-500: #6DA7F2;\n  --duffel-blue-600: #5B92E3;\n  --duffel-blue-700: #4C73C3;\n  --duffel-blue-800: #3C4D89;\n  --duffel-blue-900: #172A50;\n\n  --duffel-yellow-100: #FFF3DC;\n  --duffel-yellow-200: #FFEAC2;\n  --duffel-yellow-300: #FFDE9E;\n  --duffel-yellow-400: #FFD27C;\n  --duffel-yellow-500: #FFC350;\n  --duffel-yellow-600: #FFB524;\n  --duffel-yellow-700: #DF9912;\n  --duffel-yellow-800: #AC7813;\n  --duffel-yellow-900: #7D5300;\n\n  --duffel-orange-100: #FFEADD;\n  --duffel-orange-200: #FFD9C1;\n  --duffel-orange-300: #FFC2A0;\n  --duffel-orange-400: #FFA681;\n  --duffel-orange-500: #FF8963;\n  --duffel-orange-600: #FF6433;\n  --duffel-orange-700: #DF582D;\n  --duffel-orange-800: #B24522;\n  --duffel-orange-900: #71260E;\n\n  /* ── 2. Product UI scales (Dashboard) ─────────────────────────── */\n\n  /* Gray — the workhorse neutral of the Dashboard */\n  --gray-1: rgb(252, 252, 252);\n  --gray-2: rgb(249, 249, 249);\n  --gray-3: rgb(240, 240, 240);\n  --gray-4: rgb(232, 232, 232);\n  --gray-5: rgb(224, 224, 224);\n  --gray-6: rgb(217, 217, 217);\n  --gray-7: rgb(200, 200, 200);\n  --gray-8: rgb(187, 187, 187);\n  --gray-9: rgb(141, 141, 141);\n  --gray-10: rgb(131, 131, 131);\n  --gray-11: rgb(100, 100, 100);\n  --gray-12: rgb(32, 32, 32);\n\n  /* Gray alpha — for fills that must compose over any background */\n  --gray-a1: rgba(0, 0, 0, 0.012);\n  --gray-a2: rgba(0, 0, 0, 0.024);\n  --gray-a3: rgba(0, 0, 0, 0.059);\n  --gray-a4: rgba(0, 0, 0, 0.09);\n  --gray-a5: rgba(0, 0, 0, 0.122);\n  --gray-a6: rgba(0, 0, 0, 0.149);\n  --gray-a7: rgba(0, 0, 0, 0.192);\n  --gray-a8: rgba(0, 0, 0, 0.267);\n  --gray-a9: rgba(0, 0, 0, 0.447);\n  --gray-a10: rgba(0, 0, 0, 0.486);\n  --gray-a11: rgba(0, 0, 0, 0.608);\n  --gray-a12: rgba(0, 0, 0, 0.875);\n\n  /* Purple — the accent scale. 12 (ink) is the primary button; 9 for accent marks. */\n  --purple-1: rgb(249, 244, 255);\n  --purple-2: rgb(242, 235, 255);\n  --purple-3: rgb(232, 220, 255);\n  --purple-4: rgb(219, 200, 255);\n  --purple-5: rgb(199, 173, 255);\n  --purple-6: rgb(182, 150, 249);\n  --purple-7: rgb(158, 124, 232);\n  --purple-8: rgb(134, 101, 208);\n  --purple-9: rgb(116, 89, 172);\n  --purple-10: rgb(90, 67, 133);\n  --purple-11: rgb(65, 52, 99);\n  --purple-12: rgb(16, 0, 36);\n\n  /* Semantic scales (key steps used in the product) */\n  --green-1: rgb(240, 251, 249);\n  --green-2: rgb(229, 248, 244);\n  --green-3: rgb(204, 239, 233);\n  --green-6: rgb(90, 170, 156);\n  --green-7: rgb(56, 130, 117);\n  --green-8: rgb(32, 108, 94);\n  --green-9: rgb(26, 89, 78);\n  --green-10: rgb(19, 72, 64);\n  --green-11: rgb(13, 53, 48);\n\n  --red-1: rgb(255, 240, 240);\n  --red-3: rgb(255, 212, 212);\n  --red-6: rgb(246, 81, 91);\n  --red-7: rgb(219, 47, 70);\n  --red-8: rgb(158, 26, 43);\n  --red-9: rgb(128, 24, 35);\n  --red-10: rgb(101, 19, 27);\n  --red-11: rgb(77, 14, 20);\n\n  --blue-1: rgb(242, 247, 255);\n  --blue-3: rgb(212, 231, 255);\n  --blue-9: rgb(46, 61, 112);\n  --blue-11: rgb(29, 33, 66);\n\n  --yellow-1: rgb(255, 248, 237);\n  --yellow-3: rgb(255, 234, 194);\n  --yellow-6: rgb(255, 181, 36);\n  --yellow-7: rgb(223, 153, 18);\n  --yellow-9: rgb(138, 95, 16);\n  --yellow-10: rgb(98, 66, 0);\n\n  /* ── 3. Semantic aliases ──────────────────────────────────────── */\n\n  --color-page: #FFFFFF;\n  --color-surface: #FFFFFF;\n  --color-surface-sunken: var(--gray-2);\n  --color-surface-accent: var(--purple-1);\n\n  --color-text: var(--gray-12);\n  --color-text-secondary: var(--gray-11);\n  --color-text-tertiary: var(--gray-10);\n  --color-text-disabled: var(--gray-8);\n  --color-text-ink: var(--purple-12);\n  --color-text-on-solid: #FFFFFF;\n\n  --color-border: var(--gray-3);\n  --color-border-strong: var(--gray-5);\n  --color-border-accent: var(--purple-8);\n\n  --color-accent: var(--purple-9);\n  --color-accent-solid: var(--purple-12);\n  --color-accent-solid-hover: var(--purple-11);\n  --color-accent-hover: var(--purple-10);\n  --color-accent-soft: var(--purple-3);\n  --color-accent-soft-text: var(--purple-11);\n\n  --color-success: var(--green-7);\n  --color-success-bg: var(--green-2);\n  --color-warning: var(--yellow-9);\n  --color-warning-bg: var(--yellow-1);\n  --color-error: var(--red-9);\n  --color-error-bg: var(--red-1);\n  --color-info: var(--blue-9);\n  --color-info-bg: var(--blue-1);\n\n  --color-focus-ring: var(--purple-3);\n  --color-focus-ring-outer: rgba(134, 101, 208, 0.7);\n}\n<\u002Fstyle>\n<style>/* ──────────────────────────────────────────────────────────────────\n   Duffel typography tokens — GT America everywhere.\n   Standard for UI text; Mono for \"machine\" data: IDs, PNRs,\n   timestamps, currency codes. Mono always gets tighter tracking.\n   Scale mirrors Radix Themes sizes 1-9.\n   ────────────────────────────────────────────────────────────────── */\n\n:root {\n  --font-sans: \"GT America\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", \"Helvetica Neue\", Arial, sans-serif;\n  --font-mono: \"GT America Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  --font-weight-regular: 400;\n  --font-weight-medium: 500;\n  --font-weight-bold: 700;\n\n  /* size / line-height / letter-spacing, by step */\n  --font-size-1: 12px;   --line-height-1: 16px;  --letter-spacing-1: 0.04px;\n  --font-size-2: 14px;   --line-height-2: 20px;  --letter-spacing-2: 0;\n  --font-size-3: 16px;   --line-height-3: 24px;  --letter-spacing-3: 0;\n  --font-size-4: 18px;   --line-height-4: 26px;  --letter-spacing-4: -0.04px;\n  --font-size-5: 20px;   --line-height-5: 28px;  --letter-spacing-5: -0.08px;\n  --font-size-6: 24px;   --line-height-6: 30px;  --letter-spacing-6: -0.1px;\n  --font-size-7: 28px;   --line-height-7: 36px;  --letter-spacing-7: -0.12px;\n  --font-size-8: 35px;   --line-height-8: 40px;  --letter-spacing-8: -0.16px;\n  --font-size-9: 60px;   --line-height-9: 60px;  --letter-spacing-9: -0.4px;\n\n  /* mono data text is always tracked-in */\n  --letter-spacing-mono: -0.05em;\n\n  /* semantic text styles */\n  --text-body: var(--font-weight-regular) var(--font-size-2)/var(--line-height-2) var(--font-sans);\n  --text-body-small: var(--font-weight-regular) var(--font-size-1)/var(--line-height-1) var(--font-sans);\n  --text-label: var(--font-weight-medium) var(--font-size-2)/var(--line-height-2) var(--font-sans);\n  --text-heading: var(--font-weight-medium) var(--font-size-4)/var(--line-height-4) var(--font-sans);\n  --text-title: var(--font-weight-medium) var(--font-size-6)/var(--line-height-6) var(--font-sans);\n  --text-data: var(--font-weight-regular) var(--font-size-1)/var(--line-height-1) var(--font-mono);\n}\n\n/* Base reset for design-system pages */\n.duffel-root,\n[data-duffel] {\n  font-family: var(--font-sans);\n  font-size: var(--font-size-2);\n  line-height: var(--line-height-2);\n  color: var(--color-text);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n<\u002Fstyle>\n<style>/* ──────────────────────────────────────────────────────────────────\n   Duffel spacing, radius, and elevation tokens.\n   Spacing follows the Radix 1-9 ladder. Radii are small and quiet:\n   buttons/inputs 4px, badges 3px, cards 6-8px. The Dashboard is a\n   flat, hairline-bordered UI — shadows are reserved for overlays.\n   ────────────────────────────────────────────────────────────────── */\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 40px;\n  --space-8: 48px;\n  --space-9: 64px;\n\n  --radius-1: 3px;   /* badges, tags, small chips */\n  --radius-2: 4px;   /* buttons, inputs, table controls */\n  --radius-3: 6px;   /* cards, callouts */\n  --radius-4: 8px;   /* panels, modals */\n  --radius-5: 12px;\n  --radius-6: 16px;\n  --radius-full: 9999px;\n\n  /* Hairline borders are done with inset box-shadows in the product,\n     so they never affect layout. */\n  --border-hairline: inset 0 0 0 1px var(--gray-3);\n  --border-hairline-strong: inset 0 0 0 1px var(--gray-5);\n  --border-hairline-accent: inset 0 0 0 1px var(--purple-8);\n\n  /* Elevation — used sparingly: dropdowns, dialogs, toasts */\n  --shadow-1: 0 1px 2px rgba(16, 0, 36, 0.05);\n  --shadow-2: 0 2px 8px rgba(16, 0, 36, 0.08), 0 1px 2px rgba(16, 0, 36, 0.05);\n  --shadow-3: 0 8px 24px rgba(16, 0, 36, 0.12), 0 2px 8px rgba(16, 0, 36, 0.06);\n\n  /* Focus ring — 2px purple-3 inner + 4px translucent purple-8 outer */\n  --focus-ring: 0 0 0 2px var(--color-focus-ring), 0 0 0 4px var(--color-focus-ring-outer);\n\n  /* Component metrics */\n  --control-height-1: 24px;\n  --control-height-2: 32px;\n  --control-height-3: 40px;\n  --table-cell-min-height: 36px;\n}\n<\u002Fstyle>\n<style>\n  /* ── Theme ───────────────────────────────────────────── */\n  :root {\n    --page: #FFFFFF;\n    --surface: #FFFFFF;\n    --surface-2: var(--gray-2);\n    --text: var(--gray-12);\n    --text-2: var(--gray-11);\n    --text-3: var(--gray-10);\n    --ink: var(--purple-12);\n    --border: var(--gray-3);\n    --border-strong: var(--gray-5);\n    --flow-stroke: #ABABB4;\n  }\n  :root[data-theme=\"dark\"] {\n    --page: #0b0b0d;\n    --surface: #161619;\n    --surface-2: #101013;\n    --text: #ededee;\n    --text-2: #b2b2b9;\n    --text-3: #85858d;\n    --ink: #ffffff;\n    --border: rgba(255,255,255,0.10);\n    --border-strong: rgba(255,255,255,0.22);\n    --flow-stroke: #74747e;\n  }\n\n  /* accent per region (drives both border + text of outlined boxes) */\n  .acc-green  { --accent: var(--green-7); }\n  .acc-blue   { --accent: #4C73C3; }\n  .acc-purple { --accent: var(--purple-9); }\n  .acc-yellow { --accent: #8A5F10; }\n  .acc-ink    { --accent: var(--ink); }\n  :root[data-theme=\"dark\"] .acc-green  { --accent: #6CBFB0; }\n  :root[data-theme=\"dark\"] .acc-blue   { --accent: #6DA7F2; }\n  :root[data-theme=\"dark\"] .acc-purple { --accent: #B696F9; }\n  :root[data-theme=\"dark\"] .acc-yellow { --accent: #FFC350; }\n\n  html, body {\n    margin: 0;\n    height: 100%;\n    background: var(--page);\n    font-family: var(--font-sans);\n    color: var(--text);\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n    transition: background .16s ease-out, color .16s ease-out;\n  }\n  #stage {\n    width: 100%;\n    height: 100%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    overflow: hidden;\n  }\n  #holder { position: relative; }\n  #canvas {\n    position: absolute;\n    top: 0; left: 0;\n    width: 1440px;\n    height: 1208px;\n    transform-origin: top left;\n    background: var(--page);\n  }\n  #wires {\n    position: absolute;\n    inset: 0;\n    width: 100%;\n    height: 100%;\n    pointer-events: none;\n    z-index: 1;\n    overflow: visible;\n  }\n  #wires path.seg { fill: none; stroke: var(--flow-stroke); stroke-width: 1.5; stroke-opacity: .85; }\n  #wires path.seg.dotted { stroke-dasharray: 2 3; stroke-linecap: butt; stroke-opacity: .9; }\n  #wires marker path { fill: none; stroke: var(--flow-stroke); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }\n\n  /* ── Theme toggle ────────────────────────────────────── */\n  .theme-toggle {\n    position: fixed;\n    top: 18px; right: 18px;\n    width: 36px; height: 36px;\n    border: none;\n    border-radius: 6px;\n    background: transparent;\n    box-shadow: inset 0 0 0 1px var(--border-strong);\n    color: var(--text-2);\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    cursor: pointer;\n    z-index: 20;\n    transition: background .14s ease-out, color .14s ease-out;\n  }\n  .theme-toggle:hover { background: color-mix(in srgb, var(--text) 8%, transparent); color: var(--text); }\n  .theme-toggle svg { width: 18px; height: 18px; display: block; }\n  .theme-toggle .i-sun { display: none; }\n  :root[data-theme=\"dark\"] .theme-toggle .i-sun { display: block; }\n  :root[data-theme=\"dark\"] .theme-toggle .i-moon { display: none; }\n\n  /* Dark mode: container cards read via surface fill, no hairline */\n  :root[data-theme=\"dark\"] .product,\n  :root[data-theme=\"dark\"] .panel,\n  :root[data-theme=\"dark\"] .group { box-shadow: none; }\n\n  /* ── Header ──────────────────────────────────────────── */\n  .header {\n    position: absolute;\n    left: 168px;\n    right: 56px;\n    top: 44px;\n    text-align: center;\n  }\n  .kicker {\n    margin: 0;\n    text-align: center;\n    font-family: var(--font-mono);\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    font-size: 11px;\n    color: var(--text-3);\n  }\n  .title {\n    margin: 6px 0 0;\n    text-align: center;\n    font-size: var(--font-size-6);\n    line-height: var(--line-height-6);\n    letter-spacing: var(--letter-spacing-6);\n    font-weight: var(--font-weight-medium);\n    color: var(--text);\n  }\n\n  .content {\n    position: absolute;\n    left: 168px;\n    right: 56px;\n    top: 132px;\n  }\n  .cols {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 48px;\n  }\n\n  /* ── Outlined box (the one shared node language) ─────── */\n  .box {\n    box-sizing: border-box;\n    background: var(--surface);\n    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 55%, var(--border-strong));\n    color: var(--accent);\n    border-radius: 6px;\n    font-size: 12px;\n    font-weight: var(--font-weight-medium);\n    text-transform: uppercase;\n    letter-spacing: 0.06em;\n  }\n  .box small {\n    text-transform: none;\n    letter-spacing: normal;\n  }\n\n  /* ── Actor badge (soft duotone) ──────────────────────── */\n  .badge {\n    display: inline-flex;\n    align-self: center;\n    align-items: center;\n    font-family: var(--font-sans);\n    font-size: 11px;\n    line-height: 16px;\n    font-weight: var(--font-weight-medium);\n    letter-spacing: 0;\n    text-transform: none;\n    color: var(--accent);\n    background: color-mix(in srgb, var(--accent) 14%, var(--surface));\n    border-radius: 4px;\n    padding: 2px 9px;\n    margin-bottom: 7px;\n  }\n\n  /* ── Product cards (top) ─────────────────────────────── */\n  .product {\n    border-radius: 8px;\n    background: var(--surface);\n    box-shadow: inset 0 0 0 1px var(--border);\n    padding: 18px 20px 20px;\n  }\n  .product-head {\n    display: flex;\n    flex-direction: column;\n    gap: 3px;\n    text-align: center;\n    margin-bottom: 16px;\n  }\n  .product-head .actor {\n    font-family: var(--font-mono);\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--accent);\n  }\n  .product-head .name {\n    font-size: var(--font-size-4);\n    line-height: var(--line-height-4);\n    font-weight: var(--font-weight-medium);\n    color: var(--text);\n  }\n  .product-head .desc {\n    font-size: var(--font-size-1);\n    line-height: var(--line-height-1);\n    color: var(--text-3);\n  }\n\n  .chips {\n    display: grid;\n    gap: 16px;\n  }\n  .chips.two { grid-template-columns: 1fr 1fr; }\n  .chip-col { display: flex; flex-direction: column; align-items: stretch; }\n\n  .chip {\n    height: 38px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 0 16px;\n    text-align: center;\n    white-space: nowrap;\n  }\n\n  .resolved-gap { height: 22px; }\n  .resolved-box {\n    min-height: 58px;\n    padding: 9px 14px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    text-align: center;\n  }\n  .resolved-box .rlabel {\n    display: inline-flex;\n    align-items: center;\n    gap: 5px;\n  }\n  .resolved-box small {\n    margin-top: 3px;\n \"box step\">Search<\u002Fdiv>\n      <div class=\"vconn\"><svg viewBox=\"0 0 14 28\" width=\"14\" height=\"28\" aria-hidden=\"true\"><path d=\"M7 0 V19\"><\u002Fpath><path d=\"M3 15 L7 20 L11 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"m-eyebrow\">Page<\u002Fdiv>\n      <div class=\"box step\">Order page<\u002Fdiv>\n      <div class=\"vconn\"><svg viewBox=\"0 0 14 28\" width=\"14\" height=\"28\" aria-hidden=\"true\"><path d=\"M7 0 V19\"><\u002Fpath><path d=\"M3 15 L7 20 L11 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"m-eyebrow\">Layout<\u002Fdiv>\n      <div class=\"group layout acc-blue\">\n        <div class=\"row\">\n          <div class=\"box\">Order details<small>primary<\u002Fsmall><\u002Fdiv>\n          <div class=\"box\">Timeline sidebar<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"vconn\"><svg viewBox=\"0 0 14 28\" width=\"14\" height=\"28\" aria-hidden=\"true\"><path d=\"M7 0 V19\"><\u002Fpath><path d=\"M3 15 L7 20 L11 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"m-eyebrow\">Jobs<\u002Fdiv>\n      <div class=\"group jobs acc-blue\">\n        <div class=\"box step\"><span class=\"num\">1<\u002Fspan>Locate<\u002Fdiv>\n        <div class=\"vconn\"><svg viewBox=\"0 0 14 28\" width=\"14\" height=\"28\" aria-hidden=\"true\"><path d=\"M7 0 V19\"><\u002Fpath><path d=\"M3 15 L7 20 L11 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"box step\"><span class=\"num\">2<\u002Fspan>Manage<\u002Fdiv>\n        <div class=\"vconn\"><svg viewBox=\"0 0 14 28\" width=\"14\" height=\"28\" aria-hidden=\"true\"><path d=\"M7 0 V19\"><\u002Fpath><path d=\"M3 15 L7 20 L11 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"box step\"><span class=\"num\">3<\u002Fspan>Resolve<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"vconn\"><svg viewBox=\"0 0 14 28\" width=\"14\" height=\"28\" aria-hidden=\"true\"><path d=\"M7 0 V19\"><\u002Fpath><path d=\"M3 15 L7 20 L11 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"m-eyebrow\">Or, if unresolved<\u002Fdiv>\n      <div class=\"box step acc-purple\">Escalate to Duffel agents<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n\n<script>\n(function () {\n  var W = 1440, H = 1208;\n  var canvas = document.getElementById(\"canvas\");\n  var holder = document.getElementById(\"holder\");\n  var svg = document.getElementById(\"wires\");\n  var scale = 1;\n\n  function fit() {\n    var s = (window.innerWidth / W);\n    scale = s;\n    canvas.style.transform = \"scale(\" + s + \")\";\n    holder.style.width = (W * s) + \"px\";\n    holder.style.height = (H * s) + \"px\";\n  }\n\n  function rect(id) {\n    var e = typeof id === \"string\" ? document.getElementById(id) : id;\n    var r = e.getBoundingClientRect();\n    var c = canvas.getBoundingClientRect();\n    var x = (r.left - c.left) / scale, y = (r.top - c.top) / scale;\n    var w = r.width / scale, h = r.height / scale;\n    return { x: x, y: y, w: w, h: h, cx: x + w / 2, cy: y + h / 2, right: x + w, bottom: y + h };\n  }\n\n  function el(name, attrs) {\n    var n = document.createElementNS(\"http://www.w3.org/2000/svg\", name);\n    for (var k in attrs) n.setAttribute(k, attrs[k]);\n    return n;\n  }\n\n  function defs() {\n    var d = el(\"defs\", {});\n    var m = el(\"marker\", {\n      id: \"arr\", viewBox: \"0 0 8 10\", refX: \"5.4\", refY: \"5\",\n      markerWidth: \"7\", markerHeight: \"9\", orient: \"auto-start-reverse\"\n    });\n    m.appendChild(el(\"path\", { d: \"M 1 1 L 5 5 L 1 9\" }));\n    d.appendChild(m);\n    svg.appendChild(d);\n  }\n\n  function roundedPath(pts, r) {\n    var d = \"M \" + pts[0][0] + \" \" + pts[0][1];\n    for (var i = 1; i < pts.length - 1; i++) {\n      var p0 = pts[i - 1], p1 = pts[i], p2 = pts[i + 1];\n      var v1 = [p1[0] - p0[0], p1[1] - p0[1]], v2 = [p2[0] - p1[0], p2[1] - p1[1]];\n      var l1 = Math.hypot(v1[0], v1[1]), l2 = Math.hypot(v2[0], v2[1]);\n      var rr = Math.min(r, l1 / 2, l2 / 2);\n      var a = [p1[0] - v1[0] / l1 * rr, p1[1] - v1[1] / l1 * rr];\n      var b = [p1[0] + v2[0] / l2 * rr, p1[1] + v2[1] / l2 * rr];\n      d += \" L \" + a[0] + \" \" + a[1] + \" Q \" + p1[0] + \" \" + p1[1] + \" \" + b[0] + \" \" + b[1];\n    }\n    var last = pts[pts.length - 1];\n    d += \" L \" + last[0] + \" \" + last[1];\n    return d;\n  }\n\n  function wire(pts, opts) {\n    opts = opts || {};\n    var p = el(\"path\", {\n      class: \"seg\" + (opts.dotted ? \" dotted\" : \"\"),\n      d: roundedPath(pts, opts.radius || 16),\n      \"marker-end\": opts.noArrow ? \"\" : \"url(#arr)\"\n    });\n    svg.appendChild(p);\n  }\n\n  function vDown(fromId, toId, opts) {\n    var a = rect(fromId), b = rect(toId);\n    wire([[a.cx, a.bottom + 3], [a.cx, b.y - 5]], opts);\n  }\n  function hRight(fromId, toId, opts) {\n    var a = rect(fromId), b = rect(toId);\n    var y = Math.round((a.cy + b.cy) / 2);\n    wire([[a.right + 4, y], [b.x - 6, y]], opts);\n  }\n\n  function label(text, x, y) {\n    var d = document.createElement(\"div\");\n    d.className = \"wire-label\";\n    d.textContent = text;\n    d.style.left = x + \"px\";\n    d.style.top = y + \"px\";\n    canvas.appendChild(d);\n  }\n\n  function draw() {\n    Array.prototype.slice.call(canvas.querySelectorAll(\".wire-label\")).forEach(function (n) { n.remove(); });\n    svg.innerHTML = \"\";\n    defs();\n\n    var db = rect(\"n-dashboard\");\n\n    // Assistant: cancel -> resolved (own box), change -> dashboard\n    var cn = rect(\"n-cancel\"), rs = rect(\"n-resolved\");\n    wire([[cn.cx, cn.bottom + 3], [cn.cx, rs.y - 5]]);\n    var ch = rect(\"n-change\");\n    wire([[ch.cx, ch.bottom + 3], [ch.cx, db.y - 5]]);\n\n    // Merchant: request -> dashboard\n    var rq = rect(\"n-request\");\n    wire([[rq.cx, rq.bottom + 3], [rq.cx, db.y - 5]]);\n\n    // panels (rail + escalate-channel geometry)\n    var pL = rect(document.querySelectorAll(\".panel\")[0]);\n    var pR = rect(document.querySelectorAll(\".panel\")[1]);\n    var inbox = rect(\"n-inbox\");\n\n    // Left flow\n    vDown(\"n-inbox\", \"n-cup\");\n    vDown(\"n-cup\", \"g-layout-l\");\n    vDown(\"g-layout-l\", \"g-jobs-l\");\n    hRight(\"n-j1\", \"n-j2\");\n    hRight(\"n-j2\", \"n-j3\");\n\n    // Right flow\n    vDown(\"n-orders\", \"n-orderpage\");\n    vDown(\"n-orderpage\", \"g-layout-r\");\n    vDown(\"g-layout-r\", \"g-jobs-r\");\n    hRight(\"n-k1\", \"n-k2\");\n    hRight(\"n-k2\", \"n-k3\");\n\n    // Rail labels (align to left panel rows)\n    var railX = pL.x - 22;\n    [[\"lbl-home\", \"n-inbox\"], [\"lbl-page\", \"n-cup\"], [\"lbl-layout\", \"g-layout-l\"], [\"lbl-jobs\", \"g-jobs-l\"]].forEach(function (pair) {\n      var l = document.getElementById(pair[0]);\n      var t = rect(pair[1]);\n      l.style.left = (railX - l.offsetWidth) + \"px\";\n      l.style.top = t.cy + \"px\";\n    });\n\n    // Escalate -> loops back into the Duffel-agent queue (Inbox), via the gap channel\n    var esc = rect(\"n-escalate\");\n    var channelX = (pL.right + pR.x) / 2;\n    wire(\n      [\n        [esc.x - 3, esc.cy],\n        [channelX, esc.cy],\n        [channelX, inbox.cy],\n        [inbox.right + 5, inbox.cy]\n      ],\n      { dotted: true, radius: 16 }\n    );\n  }\n\n  function ready() {\n    if (window.matchMedia && window.matchMedia(\"(max-width: 719px)\").matches) return;\n    try { fit(); draw(); } catch (e) { console.error(\"diagram draw failed:\", e); }\n  }\n\n  // theme toggle\n  (function () {\n    var KEY = \"diagram-theme\";\n    var root = document.documentElement;\n    var btn = document.getElementById(\"themeToggle\");\n    var mq = window.matchMedia ? matchMedia(\"(prefers-color-scheme: dark)\") : null;\n    btn.addEventListener(\"click\", function () {\n      var next = root.getAttribute(\"data-theme\") === \"dark\" ? \"light\" : \"dark\";\n      try { localStorage.setItem(KEY, next); } catch (e) {}\n      root.setAttribute(\"data-theme\", next);\n    });\n    if (mq && mq.addEventListener) mq.addEventListener(\"change\", function () {\n      try { if (!localStorage.getItem(KEY)) root.setAttribute(\"data-theme\", mq.matches ? \"dark\" : \"light\"); } catch (e) {}\n    });\n  })();\n\n  window.addEventListener(\"resize\", ready);\n  ready();\n  if (document.fonts && document.fonts.ready) document.fonts.ready.then(ready);\n  window.addEventListener(\"load\", ready);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<style>
  /* Hide theme toggle */
  #themeBtn, .theme-toggle, [class*="theme-toggle"], [id*="theme"] {
    display: none !important;
    width: 0 !important;
    height: 0 !important;
    overflow: hidden !important;
  }
  /* Transparent background */
  html, body { background: transparent !important; }
  /* Expand content to fill canvas — override absolute left/right */
  .header { left: 0 !important; right: 0 !important; padding-inline: 56px !important; }
  .content { left: 0 !important; right: 0 !important; padding-inline: 56px !important; }
</style>
<script>
  // Remove toggle element aggressively
  setInterval(function() {
    var el = document.getElementById('themeBtn') || document.querySelector('.theme-toggle') || document.querySelector('[class*="theme-toggle"]');
    if (el) el.remove();
  }, 200);

  // Listen for theme sync from parent
  window.addEventListener('message', function(e) {
    if (e.data && e.data.theme) {
      var t = e.data.theme === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('diagram-theme', t);
    }
  });
</script>
